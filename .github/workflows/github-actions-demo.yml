name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # 🔹 BUILD JOB (GitHub Hosted Runner)
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build App
        run: |
          mkdir -p build
          cp app.js build/

      - name: Verify Build Files
        run: ls -R

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build/

  # 🔹 DEPLOY JOB (Self-Hosted Runner - EC2)
  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files

      - name: Verify Downloaded Files
        run: ls -R

      - name: Deploy to EC2
        run: |
          mkdir -p /home/ubuntu/app
          cp -r build/* /home/ubuntu/app/
          cd /home/ubuntu/app

          # Install dependencies (if any)
          npm install || true

          # Stop old app if running
          pm2 stop app || true

          # Start app
          pm2 start app.js || pm2 start app.js --name app
