name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # 🔹 BUILD JOB
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Build Folder
        run: |
          mkdir -p build
          cp app.js build/

      - name: Verify Build
        run: ls -R

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build

  # 🔹 DEPLOY JOB
  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files

      - name: Check Files
        run: ls -R

      - name: Deploy
        run: |
          mkdir -p /home/ubuntu/app
          cp -r build/* /home/ubuntu/app/
