name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: |
          mkdir build
          cp app.js build/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: build/

  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build

      - name: Deploy to EC2
        run: |
          mkdir -p /home/ubuntu/app
          cp -r build/* /home/ubuntu/app/
          cd /home/ubuntu/app
          npm install
          pm2 stop app || true
          pm2 start app.js
